<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счетчики с суммой</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 320px;
        }

        .list-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            transition: transform 0.2s;
        }

        .list-card:hover {
            border-color: #007bff;
            transform: translateY(-2px);
        }

        /* Стиль для блока ИТОГО (выделен цветом) */
        .list-card.total {
            background: #e8f5e9;
            border-color: #4cd964;
            border-width: 2px;
            margin-top: 25px;
        }

        .list-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: block;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        input[type="number"] {
            width: 80px;
            padding: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            color: #333;
        }

        input[type="number"]:focus {
            border-color: #007bff;
        }

        /* Стиль для поля только для чтения (Итого) */
        input[readonly] {
            background-color: #f5f5f5;
            color: #2e7d32;
            cursor: not-allowed;
            font-size: 22px;
        }

        button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-minus {
            background-color: #ff4d4d;
        }

        .btn-minus:hover {
            background-color: #e60000;
        }

        .btn-plus {
            background-color: #4cd964;
        }

        .btn-plus:hover {
            background-color: #2db842;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Список 1 -->
        <div class="list-card">
            <span class="list-title">44444</span>
            <div class="controls">
                <button class="btn-minus" onclick="changeValue(this, -1)">-</button>
                <input type="number" id="input1" value="0" onchange="calculateTotal()">
                <button class="btn-plus" onclick="changeValue(this, 1)">+</button>
            </div>
        </div>

        <!-- Список 2 -->
        <div class="list-card">
            <span class="list-title">44442</span>
            <div class="controls">
                <button class="btn-minus" onclick="changeValue(this, -1)">-</button>
                <input type="number" id="input2" value="0" onchange="calculateTotal()">
                <button class="btn-plus" onclick="changeValue(this, 1)">+</button>
            </div>
        </div>

        <!-- Список 3 (переименован) -->
        <div class="list-card">
            <span class="list-title">Другой список</span>
            <div class="controls">
                <button class="btn-minus" onclick="changeValue(this, -1)">-</button>
                <input type="number" id="input3" value="0" onchange="calculateTotal()">
                <button class="btn-plus" onclick="changeValue(this, 1)">+</button>
            </div>
        </div>

        <!-- ИТОГО (отдельно) -->
        <div class="list-card total">
            <span class="list-title">ИТОГО</span>
            <div class="controls">
                <input type="number" id="inputTotal" value="0" readonly>
            </div>
        </div>

    </div>

    <script>
        // Функция изменения значения по кнопкам
        function changeValue(button, change) {
            const controls = button.parentElement;
            const input = controls.querySelector('input');

            let currentValue = parseInt(input.value) || 0;
            currentValue += change;

            input.value = currentValue;

            // Пересчитываем итог
            calculateTotal();
        }

        // Функция подсчета суммы всех списков
        function calculateTotal() {
            const val1 = parseInt(document.getElementById('input1').value) || 0;
            const val2 = parseInt(document.getElementById('input2').value) || 0;
            const val3 = parseInt(document.getElementById('input3').value) || 0;

            const total = val1 + val2 + val3;

            document.getElementById('inputTotal').value = total;
        }
    </script>

</body>

</html>
